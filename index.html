<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 這行確保網頁在手機上比例正確，不會縮得太小 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>羽球教練預約系統</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- 引入 LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- 預約/詳情 彈出視窗 (Modal) -->
    <div id="booking-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h3 id="modal-title">預約時段</h3>
            <p id="modal-time-display" style="color:#666; margin-bottom: 15px; font-weight: bold;"></p>
            
            <form id="booking-form">
                <div class="form-group">
                    <label>時間長度：</label>
                    <select id="duration-select">
                        <option value="30">30 分鐘</option>
                        <option value="60">1 小時</option>
                        <option value="90">1.5 小時</option>
                        <option value="120">2 小時</option>
                        <option value="150">2.5 小時</option>
                        <option value="180">3 小時</option>
                    </select>
                </div>
                
                <div class="form-group" id="participants-group">
                    <label>人數 (1~5)：</label>
                    <input type="number" id="participants-input" min="1" max="5" value="1">
                </div>
                
                <div class="form-group" id="location-group">
                    <label>地點：</label>
                    <select id="location-select">
                        <option value="大安運動中心">大安運動中心</option>
                        <option value="信義運動中心">信義運動中心</option>
                        <option value="中正運動中心">中正運動中心</option>
                    </select>
                </div>
                
                <div class="form-group checkbox-group" id="trial-group">
                    <label><input type="checkbox" id="first-trial-checkbox"> 首次試上</label>
                </div>
                
                <div class="form-group" id="note-group">
                    <label>備註：</label>
                    <textarea id="note-input" rows="3" placeholder="想跟教練說什麼..."></textarea>
                </div>

                <button type="submit" id="submit-booking-btn">送出預約</button>
            </form>
        </div>
    </div>
    <!-- 預約詳細資訊 彈出視窗 (Detail Modal) -->
    <div id="detail-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-btn" id="close-detail-modal">&times;</span>
            <h3 id="detail-title">預約詳情</h3>
            
            <div id="detail-content" style="margin-top: 15px; margin-bottom: 25px; line-height: 1.8; font-size: 15px;">
                <!-- 內容會由 JS 動態塞入 -->
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button id="detail-cancel-btn" style="flex:1; background:#dc3545; color:white; padding:12px; border:none; border-radius:8px; font-size:16px; font-weight:bold; cursor:pointer;">取消預約</button>
                <button id="detail-confirm-btn" style="flex:1; background:#007bff; color:white; padding:12px; border:none; border-radius:8px; font-size:16px; font-weight:bold; cursor:pointer; display:none;">確定預約</button>
            </div>
        </div>
    </div>
    <!-- 頂部導航列：顯示使用者資訊 -->
    <header id="app-header">
        <div class="user-info">
            <img id="user-avatar" src="https://via.placeholder.com/40" alt="大頭貼">
            <span id="user-name">載入中...</span>
            <span id="role-badge" class="badge" style="display: none;">教練</span>
        </div>
    </header>

    <!-- 日期選單 (Date Carousel) -->
    <nav id="date-carousel">
        <!-- 這裡會由 JavaScript 自動產生未來 14 天的按鈕 -->
    </nav>

    <!-- 時間表 (每日 08:00 - 22:00) -->
    <main id="time-grid">
        <p style="text-align: center; color: #666;">請先等待 LINE 身份驗證...</p>
        <!-- 之後這裡會動態畫出 3 天的時段格 -->
    </main>

    <!-- 預約/詳情 彈出視窗 (Modal) - 先隱藏 -->
    <div id="booking-modal" class="modal" style="display: none;">
        <!-- 未來放表單的地方 -->
    </div>

    <!-- 引入我們的邏輯控制 -->
    <script src="script.js"></script>
</body>
</html>
